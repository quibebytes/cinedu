{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login CINEDU</title>
  <link rel="stylesheet" href="{% static 'cadastro.css' %}">
</head>

<body>

  <div class="container">

     <div class="logo">
         <img src="{% static 'LOGO.png' %}" alt="Logo CINEDU">
    </div>

    <form class="login-form" method="post" action="{% url 'cinedu:login' %}">
    {% csrf_token %}

  {{ form.username.label_tag }}
  {{ form.username }}

  {{ form.password.label_tag }}
  {{ form.password }}

 <button type="submit" class="btn-login"> Entrar </button>
  
 {% if form.errors %}
    {% for error in form.non_field_errors %}
        <div id="erro">{{ error }}</div>
    {% endfor %}
 {% endif %}

  <p class="link-cadastro">
  Não tem conta? <a href="{% url 'cinedu:cadastro' %}">Cadastre-se</a>
  </p>

    </form>

  </div>

</body>
</html>
